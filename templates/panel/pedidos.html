{% extends 'panel/base_panel.html' %}
{% block title %}Pedidos — Panel Brana{% endblock %}

{% block content %}
<div class="p-6 max-w-2xl mx-auto">
  <h1 class="text-xl font-semibold text-[#3D3535] mb-6">Buscar pedido</h1>

  <!-- Buscador -->
  <div class="bg-white rounded-2xl border border-[#C7AFB3]/20 shadow-sm p-5 flex gap-2">
    <input type="text" id="codigo-input" maxlength="4" placeholder="Código de 4 dígitos..."
           class="flex-1 border border-[#C7AFB3]/40 rounded-xl px-4 py-2.5 text-sm
                  focus:outline-none focus:border-[#C7AFB3] bg-[#FDFAF8] text-center tracking-widest font-semibold"/>
    <button onclick="buscarPedido()"
            class="bg-[#C7AFB3] hover:bg-[#b09a9e] text-white px-5 py-2.5 rounded-xl text-sm font-medium transition-colors">
      Buscar
    </button>
  </div>

  <!-- Resultado -->
  <div id="pedido-resultado" class="hidden mt-6 bg-white rounded-2xl border border-[#C7AFB3]/20 shadow-sm p-6">

    <div class="flex items-center justify-between mb-4 pb-4 border-b border-[#C7AFB3]/20">
      <div>
        <p class="text-xs uppercase tracking-wide text-[#3D3535]/50">Código de pedido</p>
        <p id="r-code" class="text-2xl font-bold text-[#C7AFB3]"></p>
      </div>
      <span id="r-status" class="text-xs px-3 py-1.5 rounded-full font-medium bg-[#FFE8DB] text-[#3D3535]"></span>
    </div>

    <div class="grid grid-cols-2 gap-4 text-sm mb-4">
      <div>
        <p class="text-xs text-[#3D3535]/50 uppercase tracking-wide">Cliente</p>
        <p id="r-email" class="font-medium text-[#3D3535]"></p>
      </div>
      <div>
        <p class="text-xs text-[#3D3535]/50 uppercase tracking-wide">Fecha</p>
        <p id="r-date" class="font-medium text-[#3D3535]"></p>
      </div>
    </div>

    <p class="text-xs text-[#3D3535]/50 uppercase tracking-wide mb-2">Productos solicitados</p>
    <div id="r-items" class="space-y-2 mb-4"></div>

    <div class="border-t border-[#C7AFB3]/20 pt-4 flex justify-between items-center">
      <span class="font-semibold text-[#3D3535]">Total del pedido</span>
      <span id="r-total" class="text-xl font-bold text-[#C7AFB3]"></span>
    </div>
  </div>

  <div id="pedido-error" class="hidden mt-6 bg-red-50 border border-red-200 text-red-500 text-sm px-5 py-4 rounded-2xl text-center"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  async function buscarPedido() {
    const code = document.getElementById('codigo-input').value.trim();
    if (code.length !== 4) { showPanelToast('Ingresa un código de 4 dígitos.'); return; }

    const res  = await fetch(`/panel/pedidos/buscar/?code=${code}`);
    const data = await res.json();

    document.getElementById('pedido-resultado').classList.add('hidden');
    document.getElementById('pedido-error').classList.add('hidden');

    if (!data.ok) {
      document.getElementById('pedido-error').textContent = data.error;
      document.getElementById('pedido-error').classList.remove('hidden');
      return;
    }

    document.getElementById('r-code').textContent   = '#' + data.code;
    document.getElementById('r-status').textContent = data.status;
    document.getElementById('r-email').textContent   = data.user_email;
    document.getElementById('r-date').textContent    = data.created_at;
    document.getElementById('r-total').textContent   = '$' + data.total;

    const itemsContainer = document.getElementById('r-items');
    itemsContainer.innerHTML = '';
    data.items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'flex justify-between items-center text-sm bg-[#FDFAF8] rounded-xl px-4 py-2.5';
      div.innerHTML = `
        <div>
          <p class="font-medium text-[#3D3535]">${item.product_name}</p>
          <p class="text-xs text-[#3D3535]/50">${item.size !== '—' ? 'Talla ' + item.size + ' · ' : ''}x${item.quantity}</p>
        </div>
        <span class="font-semibold text-[#C7AFB3]">$${item.subtotal}</span>`;
      itemsContainer.appendChild(div);
    });

    document.getElementById('pedido-resultado').classList.remove('hidden');
  }

  document.getElementById('codigo-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') buscarPedido();
  });
</script>
{% endblock %}
